<!DOCTYPE html>
<html lang="pt">
<head>

<body class="bg-slate-900 font-sans text-gray-100">

    <section id="contacto" class="container mx-auto py-12 px-6">

            <div class="h-1.5 w-20 bg-blue-600 mx-auto mt-4 rounded-full"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">

                    </div>
                </div>

                <div class="space-y-4 pt-6 border-t border-slate-700">
                    <div class="flex items-center space-x-4">
                        <div class="bg-green-50 p-3 rounded-lg text-green-600"><i class="fas fa-mobile-alt"></i></div>
                        <div>
                            <p class="text-xs text-gray-500 uppercase font-bold text-green-700">Telemóvel</p>
                            <p class="font-bold text-lg text-white font-black">965 083 452</p>
                        </div>
                    </div>

                    <div class="flex items-center space-x-4">
                        <div class="bg-blue-50 p-3 rounded-lg text-blue-600"><i class="fas fa-envelope"></i></div>
                        <div>

                            <a href="mailto:guimacar96@gmail.com" class="font-bold text-lg text-white hover:text-blue-600 transition-colors">
                                guimacar96@gmail.com
                            </a>
                        </div>
                    </div>
                    <div class="flex items-start space-x-4 pt-4 border-t border-slate-700">
                        <div class="bg-slate-700 p-3 rounded-lg text-blue-600"><i class="fas fa-clock"></i></div>
                        <div>
                            <p class="text-xs text-gray-500 uppercase font-bold text-slate-700">Horário de Funcionamento</p>
                            <div class="text-sm text-gray-300 mt-1 space-y-1">
                                <p><span class="font-bold">Segunda a Sábado:</span> 09:30 — 13:00 | 14:30 — 19:30</p>
                                <p><span class="font-bold">Domingo:</span> Encerrado</p>
                            </div>
                        </div>
                    </div>
