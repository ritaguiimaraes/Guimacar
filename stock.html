<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaturas Disponíveis | Guimacar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 font-sans text-gray-100">
    
    <!-- Loader/Splash Screen -->
    <div id="loader" class="fixed inset-0 bg-slate-950 z-[9999] flex items-center justify-center transition-opacity duration-500">
        <div class="text-center">
            <div class="mb-8">
                <h1 class="text-6xl md:text-8xl font-semibold text-white tracking-tight drop-shadow-2xl uppercase italic">
                    GUIMA<span class="text-blue-900 font-black">CAR</span>
                </h1>
            </div>
            <div class="flex justify-center space-x-2">
                <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0s;"></div>
                <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.1s;"></div>
                <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
            </div>
            <p class="text-gray-400 mt-6 text-sm uppercase tracking-wider">A carregar...</p>
        </div>
    </div>
    
    <nav class="bg-gray-100 shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-6">
            <a href="index.html" class="text-2xl font-black tracking-tighter">
                <span class="text-gray-900">GUIMA</span><span class="text-blue-900">CAR</span>
            </a>
            <a href="index.html" class="text-gray-700 hover:text-blue-600 font-bold transition text-sm uppercase tracking-widest">
                <i class="fas fa-arrow-left mr-2"></i> Voltar
            </a>
        </div>
    </nav>

    <main class="container mx-auto py-12 px-6">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black text-white tracking-tight italic uppercase">Viaturas Disponíveis</h1>
            <div class="h-1.5 w-24 bg-blue-600 mx-auto mt-4 rounded-full"></div>
        </div>
        <!--FILTROS-->
        <div class="flex flex-col gap-8">
            <!-- Barra de filtros horizontal -->
            <div class="max-w-[1200px] mx-auto bg-gradient-to-r from-slate-800 via-slate-750 to-slate-800 rounded-[2rem] p-6 border border-slate-600 shadow-xl mb-8">
                <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                    <h3 class="text-xl font-black text-white italic">Filtros</h3>
                    <div class="flex items-center gap-4">
                        <span class="text-gray-300 text-sm font-medium uppercase tracking-tighter">
                            <span id="results-count" class="text-blue-400 font-bold">12</span> viaturas encontradas
                        </span>
                        <button id="clear-filters" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-bold transition text-xs uppercase tracking-widest shadow-lg">
                            <i class="fas fa-redo-alt mr-2"></i> Limpar
                        </button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                    <!-- Filtro de Combustível -->
                    <div>
                        <label class="block text-sm font-bold text-blue-400 mb-2 uppercase tracking-wider">Combustível</label>
                        <select class="filter-select w-full bg-slate-700/80 text-white border border-slate-500/50 rounded-xl px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition backdrop-blur-sm" data-filter="combustivel">
                            <option value="Todos">Todos</option>
                            <option value="Gasóleo">Gasóleo</option>
                            <option value="Gasolina">Gasolina</option>
                            <option value="Híbrido">Híbrido</option>
                        </select>
                    </div>

                    <!-- Filtro de Quilómetros -->
                    <div>
                        <label class="block text-sm font-bold text-blue-400 mb-2 uppercase tracking-wider">Quilómetros</label>
                        <select class="filter-select w-full bg-slate-700/80 text-white border border-slate-500/50 rounded-xl px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition backdrop-blur-sm" data-filter="kms">
                            <option value="Todos">Todos</option>
                            <option value="0-50000">Até 50.000 km</option>
                            <option value="50000-100000">50.000 - 100.000 km</option>
                            <option value="100000-150000">100.000 - 150.000 km</option>
                            <option value="150000+">Mais de 150.000 km</option>
                        </select>
                    </div>

                    <!-- Filtro de Ano -->
                    <div>
                        <label class="block text-sm font-bold text-blue-400 mb-2 uppercase tracking-wider">Ano</label>
                        <select class="filter-select w-full bg-slate-700/80 text-white border border-slate-500/50 rounded-xl px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition backdrop-blur-sm" data-filter="ano">
                            <option value="Todos">Todos</option>
                            <option value="2020+">2020 ou mais recente</option>
                            <option value="2018-2020">2018 - 2020</option>
                            <option value="2015-2018">2015 - 2018</option>
                            <option value="antes-2015">Antes de 2015</option>
                        </select>
                    </div>

                    <!-- Filtro de Preço -->
                    <div>
                        <label class="block text-sm font-bold text-blue-400 mb-2 uppercase tracking-wider">Faixa de Preço</label>
                        <select class="filter-select w-full bg-slate-700/80 text-white border border-slate-500/50 rounded-xl px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition backdrop-blur-sm" data-filter="preco">
                            <option value="Todos">Todos</option>
                            <option value="0-10000">Até 10.000 €</option>
                            <option value="10000-15000">10.000 - 15.000 €</option>
                            <option value="15000-20000">15.000 - 20.000 €</option>
                            <option value="20000+">Mais de 20.000 €</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Grid de carros -->
            <div style="max-width: 1200px; margin: 0 auto;">
                <div id="grid-carros" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Os cards serão gerados por JavaScript -->
                </div>
            </div>

            <!-- Paginação -->
            <div id="pagination"></div>
        </div>
    </main>

    <script src="carros.js"></script>
    <script>
        const gridCarros = document.getElementById('grid-carros');
        const carsPerPage = 9;
        let currentPage = 1;
        let filteredCars = [];
        
        // Ordenar carros por ID decrescente (mais recentes primeiro)
        const sortedCars = [...stockGuimacar].sort((a, b) => b.id - a.id);
        filteredCars = sortedCars;
        
        // Estado dos filtros
        const filters = {
            combustivel: 'Todos',
            kms: 'Todos',
            ano: 'Todos',
            preco: 'Todos'
        };

        // Função para extrair valor numérico do preço
        function extractPrice(priceString) {
            return parseInt(priceString.replace(/[^\d]/g, ''));
        }

        // Função para extrair ano do mês
        function extractYear(mesString) {
            const yearMatch = mesString.match(/\d{4}/);
            return yearMatch ? parseInt(yearMatch[0]) : 0;
        }

        // Função para extrair valor numérico dos kms
        function extractKms(kmsString) {
            return parseInt(kmsString.replace(/[^\d]/g, ''));
        }

        // Função para aplicar filtros
        function applyFilters() {
            filteredCars = sortedCars.filter(carro => {
                // Filtro de combustível
                if (filters.combustivel !== 'Todos' && carro.combustivel !== filters.combustivel) {
                    return false;
                }

                // Filtro de quilómetros
                if (filters.kms !== 'Todos') {
                    const kms = extractKms(carro.kms);
                    switch (filters.kms) {
                        case '0-50000':
                            if (kms > 50000) return false;
                            break;
                        case '50000-100000':
                            if (kms < 50000 || kms > 100000) return false;
                            break;
                        case '100000-150000':
                            if (kms < 100000 || kms > 150000) return false;
                            break;
                        case '150000+':
                            if (kms < 150000) return false;
                            break;
                    }
                }

                // Filtro de ano
                if (filters.ano !== 'Todos') {
                    const year = extractYear(carro.mes);
                    switch (filters.ano) {
                        case '2020+':
                            if (year < 2020) return false;
                            break;
                        case '2018-2020':
                            if (year < 2018 || year > 2020) return false;
                            break;
                        case '2015-2018':
                            if (year < 2015 || year > 2018) return false;
                            break;
                        case 'antes-2015':
                            if (year >= 2015) return false;
                            break;
                    }
                }

                // Filtro de preço
                if (filters.preco !== 'Todos') {
                    const price = extractPrice(carro.preco);
                    switch (filters.preco) {
                        case '0-10000':
                            if (price > 10000) return false;
                            break;
                        case '10000-15000':
                            if (price < 10000 || price > 15000) return false;
                            break;
                        case '15000-20000':
                            if (price < 15000 || price > 20000) return false;
                            break;
                        case '20000+':
                            if (price < 20000) return false;
                            break;
                    }
                }

                return true;
            });

            // Reset para primeira página
            currentPage = 1;
            renderPage(1);
            updateResultsCount();
        }

        // Função para atualizar contador de resultados
        function updateResultsCount() {
            document.getElementById('results-count').textContent = filteredCars.length;
        }

        // Event listeners para filtros
        document.querySelectorAll('.filter-select').forEach(select => {
            select.addEventListener('change', function() {
                const filterType = this.dataset.filter;
                const filterValue = this.value;

                // Atualiza o filtro
                filters[filterType] = filterValue;

                applyFilters();
            });
        });

        // Botão limpar filtros
        document.getElementById('clear-filters').addEventListener('click', function() {
            // Reset todos os filtros
            Object.keys(filters).forEach(key => {
                filters[key] = 'Todos';
            });

            // Reset selects
            document.querySelectorAll('.filter-select').forEach(select => {
                select.value = 'Todos';
            });

            applyFilters();
        });

        function renderPage(page) {
            const startIndex = (page - 1) * carsPerPage;
            const endIndex = startIndex + carsPerPage;
            const carsToShow = filteredCars.slice(startIndex, endIndex);
            
            gridCarros.innerHTML = '';
            
            carsToShow.forEach(carro => {
                const card = document.createElement('div');
                card.className = 'bg-slate-800 rounded-[2rem] overflow-hidden shadow-lg hover:shadow-xl transition-all duration-300 cursor-pointer transform hover:scale-105 border border-slate-700 w-full max-w-[460px]';
                
                card.innerHTML = `
                    <div class="p-3">
                        <div class="relative h-60 w-full overflow-hidden rounded-2xl shadow-sm">
                            <img src="${carro.fotos && carro.fotos.length > 0 ? carro.fotos[0] : 'img/inicio.jpg'}" class="w-full h-full object-cover" alt="${carro.marca}">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent">
                                <div class="absolute bottom-3 left-0 right-0 px-4 flex justify-between text-white text-[10px] font-bold uppercase tracking-wider">
                                    <span><i class="fas fa-calendar-alt mr-1 text-blue-600"></i>${extractYear(carro.mes)}</span>
                                    <span><i class="fas fa-gas-pump mr-1 text-blue-600"></i>${carro.combustivel}</span>
                                    <span><i class="fas fa-road mr-1 text-blue-600"></i>${carro.kms}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="px-6 py-2">
                        <h3 class="text-2xl font-black text-white leading-tight">${carro.marca}</h3>
                        <p class="text-gray-300 text-sm mb-4 font-medium">${carro.modelo}</p>
                        <div class="flex items-end justify-between border-t border-gray-50 pt-4">
                            <div>
                                <p class="text-3xl font-black text-blue-600">${carro.preco}</p>
                            </div>
                        </div>
                    </div>
                `;

                card.onclick = function() {
                    window.location.href = `detalhes.html?id=${carro.id}`;
                };

                gridCarros.appendChild(card);
            });
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredCars.length / carsPerPage);
            const paginationContainer = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }
            
            let paginationHTML = '<div class="flex justify-center items-center space-x-2 mt-12">';
            
            // Botão Anterior
            if (currentPage > 1) {
                paginationHTML += `<button onclick="changePage(${currentPage - 1})" class="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition">← Anterior</button>`;
            }
            
            // Números das páginas
            for (let i = 1; i <= totalPages; i++) {
                const isActive = i === currentPage;
                paginationHTML += `<button onclick="changePage(${i})" class="px-4 py-2 ${isActive ? 'bg-blue-600 text-white' : 'bg-slate-700 text-gray-300 hover:bg-slate-600'} rounded-lg transition">${i}</button>`;
            }
            
            // Botão Seguinte
            if (currentPage < totalPages) {
                paginationHTML += `<button onclick="changePage(${currentPage + 1})" class="px-4 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-600 transition">Seguinte →</button>`;
            }
            
            paginationHTML += '</div>';
            paginationContainer.innerHTML = paginationHTML;
        }

        function changePage(page) {
            currentPage = page;
            renderPage(page);
            // Scroll para o topo da página
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Renderizar primeira página
        renderPage(1);
        updateResultsCount();
    </script>

    <script>
        // Controlo do Loader
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                
                setTimeout(function() {
                    loader.style.display = 'none';
                }, 500);
            }, 1000);
        });
    </script>

    <footer class="bg-gray-100 border-t border-gray-200 py-10">
        <div class="text-center text-gray-500 text-sm">
            <p>© 2026 GUIMACAR - Todos os direitos reservados</p>
        </div>
    </footer>
</body>
</html>
