<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Viatura | Guimacar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-6">
            <a href="index.html" class="text-2xl font-black tracking-tighter">GUIMA<span class="text-blue-900">CAR</span></a>
            <a href="stock.html" class="text-gray-500 hover:text-blue-900 font-bold transition text-sm uppercase tracking-widest">
                <i class="fas fa-arrow-left mr-2"></i> Voltar ao Stock
            </a>
        </div>
    </nav>

    <main class="container mx-auto py-12 px-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            
            <div class="space-y-4">
                <div class="rounded-[2.5rem] overflow-hidden shadow-2xl bg-white p-2">
                    <img id="foto-principal" src="img/carro1/1.jpg" class="w-full h-[450px] object-cover rounded-[2rem]" alt="Carro">
                </div>
                <div id="galeria-miniaturas" class="grid grid-cols-4 gap-4">
                    </div>
            </div>

            <div class="flex flex-col justify-center space-y-8">
                <div>
                    <span class="bg-blue-100 text-blue-900 text-xs font-black px-4 py-1 rounded-full uppercase tracking-widest">Destaque Guimacar</span>
                    <h1 id="nome-carro" class="text-5xl font-black text-slate-900 mt-4 leading-tight uppercase italic">BMW 116d</h1>
                    <p id="sub-nome" class="text-xl text-gray-500 font-medium">Aut. Advantage - Pack M</p>
                </div>

                <div class="bg-white rounded-[2rem] p-8 shadow-xl border border-gray-100">
                    <div class="flex items-end justify-between mb-8">
                        <div>
                            <p class="text-gray-400 text-sm line-through">Antes 16 900 €</p>
                            <p id="preco-carro" class="text-5xl font-black text-blue-900 tracking-tighter">15 900 €</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-400 font-bold uppercase">Financiamento</p>
                            <p class="text-xl font-black text-gray-900">Desde 211€/mês</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6 pt-6 border-t border-gray-100">
                        <div class="flex items-center space-x-4">
                            <div class="bg-gray-100 p-3 rounded-2xl text-blue-900"><i class="fas fa-calendar-alt"></i></div>
                            <div><p class="text-xs text-gray-400 uppercase font-bold">Ano</p><p class="font-black">2018</p></div>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="bg-gray-100 p-3 rounded-2xl text-blue-900"><i class="fas fa-road"></i></div>
                            <div><p class="text-xs text-gray-400 uppercase font-bold">Quilómetros</p><p class="font-black">176.307 km</p></div>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="bg-gray-100 p-3 rounded-2xl text-blue-900"><i class="fas fa-gas-pump"></i></div>
                            <div><p class="text-xs text-gray-400 uppercase font-bold">Combustível</p><p class="font-black">Gasóleo</p></div>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="bg-gray-100 p-3 rounded-2xl text-blue-900"><i class="fas fa-cogs"></i></div>
                            <div><p class="text-xs text-gray-400 uppercase font-bold">Transmissão</p><p class="font-black">Automática</p></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <a href="https://wa.me/351965083452" class="bg-green-500 hover:bg-green-600 text-white p-5 rounded-2xl font-black text-center shadow-lg transition transform hover:-translate-y-1">
                        <i class="fab fa-whatsapp mr-2 text-xl"></i> FALAR NO WHATSAPP
                    </a>
                    <a href="tel:+351965083452" class="bg-blue-900 hover:bg-slate-900 text-white p-5 rounded-2xl font-black text-center shadow-lg transition transform hover:-translate-y-1">
                        LIGAR AGORA
                    </a>
                </div>
            </div>
        </div>
    </main>
    <script src="carros.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const idCarro = urlParams.get('id');
        const carro = stockGuimacar.find(c => c.id == idCarro);

        if (carro) {
            console.log('Carro encontrado:', carro);
            console.log('Fotos disponíveis:', carro.fotos);
            // Preenche os textos
            document.getElementById('nome-carro').innerText = carro.marca;
            document.getElementById('sub-nome').innerText = carro.modelo;
            document.getElementById('preco-carro').innerText = carro.preco;

            // Preenche a Foto Principal
            const fotoPrincipal = document.getElementById('foto-principal');
            fotoPrincipal.src = carro.fotos[0];

            // Cria as Miniaturas na div "galeria-miniaturas"
            const contentorMiniaturas = document.getElementById('galeria-miniaturas');
            contentorMiniaturas.innerHTML = ''; // Limpa o que lá estiver

            carro.fotos.forEach((fotoUrl, index) => {
                console.log(`Carregando foto ${index + 1} de ${carro.fotos.length}`);
                const imgMini = document.createElement('img');
                imgMini.src = fotoUrl;
                imgMini.className = "h-24 w-full object-cover rounded-2xl cursor-pointer hover:opacity-80 transition border-2 border-transparent hover:border-blue-900";
                
                imgMini.onclick = function() {
                    fotoPrincipal.src = this.src;
                };
                
                contentorMiniaturas.appendChild(imgMini);
            });
        } else {
            console.log('Carro não encontrado para o ID:', idCarro);
            console.log('IDs disponíveis:', stockGuimacar.map(c => c.id));
        }
    </script>
    <footer class="bg-white py-10 mt-20 border-t border-gray-100 text-center text-gray-400 text-xs">
        <p> 2026 GUIMACAR - Todos os direitos reservados</p>
    </footer>

</body>
</html>
